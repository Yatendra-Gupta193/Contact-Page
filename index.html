<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Page</title>
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">
    <div class="card">

        <!-- LEFT SECTION -->
        <div class="left">
            <h1>Get in <span>touch</span></h1>

            <div class="info">
                <p><i class="fa-solid fa-envelope"></i> guptajikkrish12@gmail.com</p>
                <p><i class="fa-solid fa-phone"></i> +91 82668 93747</p>
                <p><i class="fa-solid fa-location-dot"></i> Sadabad , Hathras</p>
            </div>

            <!-- SOCIAL ICONS -->
            <div class="social">
                <a href="https://www.linkedin.com/in/yatendra-kumar-gupta-b321a3326/" target="_blank"><i class="fa-brands fa-linkedin-in"></i></a>
                <a href="https://wa.me/919000000000" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
                <a href="https://instagram.com" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>

        <!-- RIGHT SECTION -->
        <div class="right">
            <h2>Please fill up the form</h2>

            <form id="contactForm">
                <label>Your Name</label>
                <input type="text" id="name" placeholder="Enter your name">

                <label>Your Email</label>
                <input type="email" id="email" placeholder="Enter your email">

                <label>Your Message</label>
                <textarea id="message" placeholder="Type your message..."></textarea>

                <button type="submit">Submit</button>
            </form>
        </div>

    </div>
</div>
 
<script src="script.js"></script>
</body>
</html>
